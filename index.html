<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Meme Maze - Playable NFT Game</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at top, #161616, #030303 70%);
    color: #fff;
    font-family: Arial, Helvetica, sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 18px;
  }
  .wrap {
    width: min(520px, 100%);
    text-align: center;
  }
  h1 {
    margin: 0 0 6px;
    font-size: 36px;
  }
  .subtitle {
    opacity: .75;
    margin-bottom: 12px;
  }
  .topbar {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 10px;
    margin-bottom: 12px;
  }
  .box {
    background: #171717;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 9px 10px;
  }
  .label {
    font-size: 11px;
    opacity: .65;
    text-transform: uppercase;
  }
  .value {
    font-size: 21px;
    font-weight: 900;
  }
  button {
    background: #ffd43b;
    color: #111;
    border: none;
    border-radius: 12px;
    padding: 10px 12px;
    font-weight: 900;
    cursor: pointer;
  }
  canvas {
    width: 100%;
    max-width: 500px;
    aspect-ratio: 1 / 1;
    background: #050505;
    border: 2px solid #333;
    border-radius: 18px;
    box-shadow: 0 18px 50px rgba(0,0,0,.55);
    touch-action: none;
  }
  .panel {
    margin-top: 12px;
    background: #151515;
    border: 1px solid #333;
    border-radius: 16px;
    padding: 12px;
    font-size: 13px;
    line-height: 1.35;
    opacity: .9;
  }
  .controls {
    display: grid;
    grid-template-columns: repeat(3, 58px);
    grid-template-rows: repeat(3, 48px);
    justify-content: center;
    gap: 8px;
    margin-top: 12px;
  }
  .controls button {
    padding: 0;
    font-size: 20px;
  }
  .blank { visibility: hidden; }
  input {
    width: 100%;
    margin-top: 8px;
    border-radius: 10px;
    border: 1px solid #444;
    background: #090909;
    color: white;
    padding: 10px;
  }
  .leaderboard {
    text-align: left;
  }
  .leaderboard h2 {
    margin: 0 0 8px;
    font-size: 18px;
    text-align:center;
  }
  .leaderboard ol {
    margin: 0;
    padding-left: 24px;
  }
  .leaderboard li {
    padding: 3px 0;
    border-bottom: 1px solid rgba(255,255,255,.06);
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Meme Maze</h1>
  <div class="subtitle">Pac-Man-style playable NFT game</div>

  <div class="topbar">
    <div class="box"><div class="label">Score</div><div id="score" class="value">0</div></div>
    <div class="box"><div class="label">Lives</div><div id="lives" class="value">3</div></div>
    <button onclick="newGame()">New</button>
  </div>

  <canvas id="game" width="500" height="500"></canvas>

  <div class="controls">
    <button class="blank"></button><button onclick="setDir(0,-1)">▲</button><button class="blank"></button>
    <button onclick="setDir(-1,0)">◀</button><button onclick="pauseGame()">⏸</button><button onclick="setDir(1,0)">▶</button>
    <button class="blank"></button><button onclick="setDir(0,1)">▼</button><button class="blank"></button>
  </div>

  <div class="panel">
    Eat the dots, avoid the meme ghosts, grab power coins, and clear the maze.
    Use arrow keys, swipe, or the on-screen buttons.
  </div>

  <div class="panel">
    <button style="width:100%;" onclick="connectWallet()">Connect Wallet</button>
    <div id="walletBox" style="margin-top:8px;word-break:break-word;opacity:.75;">Not connected. Scores save locally unless you add a global leaderboard endpoint.</div>
    <input id="playerName" maxlength="18" placeholder="Player name for leaderboard" />
  </div>

  <div class="panel leaderboard">
    <h2>Top 20 Scores</h2>
    <ol id="leaderboard"></ol>
  </div>
</div>

<script>
/*
To make the leaderboard global for all NFT players:
1. Deploy an API or score smart contract.
2. Set LEADERBOARD_ENDPOINT below.
3. POST should accept { name, score, wallet }.
4. GET should return [{ name, score, wallet, date }].
*/
const LEADERBOARD_ENDPOINT = "";

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const scoreEl = document.getElementById("score");
const livesEl = document.getElementById("lives");
const lbEl = document.getElementById("leaderboard");

const tile = 25;
const rows = 20;
const cols = 20;

const rawMap = [
"####################",
"#........#.........#",
"#.##.###.#.###.##..#",
"#o##...........##o.#",
"#.##.#.#####.#.##..#",
"#....#...#...#.....#",
"####.### # ###.#####",
"   #.#       #.#    ",
"####.# ## ## #.#####",
"    .  #   #  .     ",
"####.# ## ## #.#####",
"   #.#       #.#    ",
"####.# ##### #.#####",
"#........#.........#",
"#.##.###.#.###.##..#",
"#o.#.....P.....#.o.#",
"##.#.#.#####.#.#.###",
"#....#...#...#.....#",
"#.######.#.######..#",
"####################"
];

let map, player, ghosts, score, lives, direction, nextDirection, paused, powerTimer, walletAddress, gameLoop;

function cloneMap() {
  return rawMap.map(row => row.split(""));
}

function newGame() {
  map = cloneMap();
  player = { x: 9, y: 15, px: 9, py: 15 };
  ghosts = [
    { x: 9, y: 9, emoji: "🐸", color: "#5ce36a", delay: 0 },
    { x: 10, y: 9, emoji: "🐶", color: "#ff704d", delay: 3 },
    { x: 9, y: 10, emoji: "🐱", color: "#68b7ff", delay: 6 },
    { x: 10, y: 10, emoji: "👻", color: "#d17dff", delay: 9 }
  ];
  score = 0;
  lives = 3;
  direction = {x: 0, y: 0};
  nextDirection = {x: 0, y: 0};
  paused = false;
  powerTimer = 0;
  if (gameLoop) clearInterval(gameLoop);
  gameLoop = setInterval(tick, 140);
  draw();
}

function isWall(x, y) {
  if (x < 0 || x >= cols || y < 0 || y >= rows) return false;
  return map[y][x] === "#";
}

function canMove(x, y, dir) {
  let nx = x + dir.x;
  let ny = y + dir.y;
  if (nx < 0) nx = cols - 1;
  if (nx >= cols) nx = 0;
  return !isWall(nx, ny);
}

function moveEntity(e, dir) {
  if (!canMove(e.x, e.y, dir)) return;
  e.x += dir.x;
  e.y += dir.y;
  if (e.x < 0) e.x = cols - 1;
  if (e.x >= cols) e.x = 0;
}

function setDir(x, y) {
  nextDirection = {x, y};
}

function pauseGame() {
  paused = !paused;
}

function tick() {
  if (paused) return;

  if (canMove(player.x, player.y, nextDirection)) direction = nextDirection;
  moveEntity(player, direction);

  const cell = map[player.y][player.x];
  if (cell === ".") {
    map[player.y][player.x] = " ";
    score += 10;
  }
  if (cell === "o") {
    map[player.y][player.x] = " ";
    score += 50;
    powerTimer = 55;
  }

  ghosts.forEach(g => {
    if (g.delay > 0) { g.delay--; return; }
    moveGhost(g);
  });

  checkCollisions();

  if (powerTimer > 0) powerTimer--;

  scoreEl.textContent = score;
  livesEl.textContent = lives;

  if (!map.flat().includes(".") && !map.flat().includes("o")) {
    saveScore(true);
    alert("Maze cleared! Score saved: " + score);
    newGame();
    return;
  }

  draw();
}

function moveGhost(g) {
  const dirs = [
    {x:1,y:0}, {x:-1,y:0}, {x:0,y:1}, {x:0,y:-1}
  ].filter(d => canMove(g.x, g.y, d));

  if (!dirs.length) return;

  let chosen;
  if (powerTimer > 0) {
    chosen = dirs.sort((a,b) => {
      const da = Math.abs((g.x+a.x)-player.x) + Math.abs((g.y+a.y)-player.y);
      const db = Math.abs((g.x+b.x)-player.x) + Math.abs((g.y+b.y)-player.y);
      return db - da;
    })[0];
  } else if (Math.random() < 0.75) {
    chosen = dirs.sort((a,b) => {
      const da = Math.abs((g.x+a.x)-player.x) + Math.abs((g.y+a.y)-player.y);
      const db = Math.abs((g.x+b.x)-player.x) + Math.abs((g.y+b.y)-player.y);
      return da - db;
    })[0];
  } else {
    chosen = dirs[Math.floor(Math.random() * dirs.length)];
  }

  moveEntity(g, chosen);
}

function checkCollisions() {
  ghosts.forEach(g => {
    if (g.x === player.x && g.y === player.y) {
      if (powerTimer > 0) {
        score += 200;
        g.x = 9 + Math.floor(Math.random() * 2);
        g.y = 9 + Math.floor(Math.random() * 2);
        g.delay = 6;
      } else {
        lives--;
        if (lives <= 0) {
          livesEl.textContent = 0;
          saveScore(true);
          alert("Game over! Score saved: " + score);
          newGame();
          return;
        }
        player.x = 9; player.y = 15;
        direction = {x:0,y:0};
        nextDirection = {x:0,y:0};
      }
    }
  });
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "#050505";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  for (let y=0; y<rows; y++) {
    for (let x=0; x<cols; x++) {
      const c = map[y][x];
      const px = x * tile;
      const py = y * tile;

      if (c === "#") {
        ctx.fillStyle = "#144bff";
        roundRect(px+2, py+2, tile-4, tile-4, 6);
      } else if (c === ".") {
        ctx.fillStyle = "#ffdcb0";
        ctx.beginPath();
        ctx.arc(px+tile/2, py+tile/2, 3, 0, Math.PI*2);
        ctx.fill();
      } else if (c === "o") {
        ctx.fillStyle = "#ffd43b";
        ctx.beginPath();
        ctx.arc(px+tile/2, py+tile/2, 7, 0, Math.PI*2);
        ctx.fill();
      }
    }
  }

  // Player
  const mouth = Date.now() % 300 < 150 ? 0.28 : 0.08;
  const angle = Math.atan2(direction.y, direction.x || 0.0001);
  const px = player.x * tile + tile/2;
  const py = player.y * tile + tile/2;
  ctx.fillStyle = "#ffd43b";
  ctx.beginPath();
  if (direction.x === 0 && direction.y === 0) {
    ctx.arc(px, py, tile*0.42, 0, Math.PI*2);
  } else {
    ctx.moveTo(px, py);
    ctx.arc(px, py, tile*0.42, angle + mouth*Math.PI, angle + (2-mouth)*Math.PI);
  }
  ctx.fill();

  // Ghosts / meme enemies
  ghosts.forEach(g => {
    const gx = g.x * tile + tile/2;
    const gy = g.y * tile + tile/2;
    ctx.fillStyle = powerTimer > 0 ? "#245cff" : g.color;
    ctx.beginPath();
    ctx.arc(gx, gy, tile*0.42, Math.PI, 0);
    ctx.lineTo(gx + tile*0.42, gy + tile*0.34);
    ctx.lineTo(gx + tile*0.25, gy + tile*0.22);
    ctx.lineTo(gx + tile*0.08, gy + tile*0.34);
    ctx.lineTo(gx - tile*0.08, gy + tile*0.22);
    ctx.lineTo(gx - tile*0.25, gy + tile*0.34);
    ctx.lineTo(gx - tile*0.42, gy + tile*0.34);
    ctx.closePath();
    ctx.fill();

    ctx.font = "15px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(g.emoji, gx, gy + 1);
  });

  if (paused) {
    ctx.fillStyle = "rgba(0,0,0,.65)";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "#fff";
    ctx.font = "bold 42px Arial";
    ctx.textAlign = "center";
    ctx.fillText("PAUSED", 250, 250);
  }
}

function roundRect(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.fill();
}

function playerName() {
  return (document.getElementById("playerName").value || (walletAddress ? walletAddress.slice(0,6)+"..."+walletAddress.slice(-4) : "Anonymous")).trim();
}

function getScores() {
  try { return JSON.parse(localStorage.getItem("memeMaze_scores") || "[]"); }
  catch { return []; }
}

function saveScore(force) {
  if (!force || score <= 0) return;
  let scores = getScores();
  scores.push({ name: playerName(), score, wallet: walletAddress || "", date: new Date().toISOString() });
  scores = scores.sort((a,b) => b.score - a.score).slice(0,20);
  localStorage.setItem("memeMaze_scores", JSON.stringify(scores));
  drawLeaderboard(scores);
  submitGlobalScore();
}

function drawLeaderboard(scores) {
  scores = scores || getScores();
  lbEl.innerHTML = "";
  if (!scores.length) {
    lbEl.innerHTML = "<li>No scores yet</li>";
    return;
  }
  scores.slice(0,20).forEach(s => {
    const li = document.createElement("li");
    li.textContent = `${s.name || "Anonymous"} — ${s.score}`;
    lbEl.appendChild(li);
  });
}

async function submitGlobalScore() {
  if (!LEADERBOARD_ENDPOINT) return;
  try {
    await fetch(LEADERBOARD_ENDPOINT, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: playerName(), score, wallet: walletAddress || "" })
    });
    const res = await fetch(LEADERBOARD_ENDPOINT);
    const globalScores = await res.json();
    drawLeaderboard(globalScores);
  } catch(e) {
    console.log("Global leaderboard unavailable", e);
  }
}

async function connectWallet() {
  const box = document.getElementById("walletBox");
  if (!window.ethereum) {
    box.textContent = "No Ethereum wallet detected. Use MetaMask or a browser with an injected wallet.";
    return;
  }
  try {
    const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
    walletAddress = accounts[0];
    box.textContent = "Connected wallet: " + walletAddress;
    if (!document.getElementById("playerName").value) {
      document.getElementById("playerName").value = walletAddress.slice(0,6)+"..."+walletAddress.slice(-4);
    }
  } catch (err) {
    box.textContent = "Wallet connection rejected or unavailable.";
  }
}

document.addEventListener("keydown", e => {
  if (["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"," "].includes(e.key)) e.preventDefault();
  if (e.key === "ArrowLeft") setDir(-1,0);
  if (e.key === "ArrowRight") setDir(1,0);
  if (e.key === "ArrowUp") setDir(0,-1);
  if (e.key === "ArrowDown") setDir(0,1);
  if (e.key === " ") pauseGame();
});

let sx=0, sy=0;
canvas.addEventListener("touchstart", e => {
  sx = e.changedTouches[0].clientX;
  sy = e.changedTouches[0].clientY;
}, {passive:true});
canvas.addEventListener("touchend", e => {
  const dx = e.changedTouches[0].clientX - sx;
  const dy = e.changedTouches[0].clientY - sy;
  if (Math.max(Math.abs(dx), Math.abs(dy)) < 25) return;
  if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 1 : -1, 0);
  else setDir(0, dy > 0 ? 1 : -1);
}, {passive:true});

drawLeaderboard();
newGame();
</script>
</body>
</html>
